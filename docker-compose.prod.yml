# Production stack. Code and assets are baked into images (no bind mounts).
#
# Prerequisites:
#   docker network create main            # shared reverse-proxy network
#   cp backend/.env.example backend/.env   # then set production values:
#     APP_ENV=production, APP_DEBUG=false, a generated APP_KEY,
#     real DB_PASSWORD, Telegram + WooCommerce secrets, APP_URL, and
#     CORS_ALLOWED_ORIGINS / SANCTUM_STATEFUL_DOMAINS = your domain.
#
# Build & start:
#   docker compose -f docker-compose.prod.yml up -d --build
#   docker compose -f docker-compose.prod.yml exec app php artisan migrate --force
#
# A reverse proxy on the `main` network terminates TLS and routes to `web`.

services:
  db:
    image: postgres:17
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_DATABASE:-restaurant_app}
      POSTGRES_USER: ${DB_USERNAME:-restaurant_app}
      POSTGRES_PASSWORD: ${DB_PASSWORD:?DB_PASSWORD is required}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME:-restaurant_app}"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - main

  app:
    build:
      context: .
      target: app
    restart: unless-stopped
    env_file:
      - ./backend/.env
    depends_on:
      db:
        condition: service_healthy
    networks:
      - main

  scheduler:
    build:
      context: .
      target: app
    restart: unless-stopped
    env_file:
      - ./backend/.env
    command: php artisan schedule:work
    depends_on:
      db:
        condition: service_healthy
    networks:
      - main

  web:
    build:
      context: .
      target: web
    restart: unless-stopped
    depends_on:
      - app
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost/up >/dev/null 2>&1 || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
    networks:
      - main

volumes:
  pgdata:

networks:
  main:
    external: true
